name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements.lock
      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Lint
        run: python -m ruff check app tests
      - name: Check formatting
        run: python -m ruff format --check app tests
      - name: Run tests with coverage
        run: python -m pytest --quiet --cov=app --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          files: backend/coverage.xml
          use_oidc: true
      - name: Verify dependency tree
        run: python -m pip check

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Type-check
        run: npm run typecheck
      - name: Check Expo compatibility
        run: npm run doctor
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  container:
    name: Backend container
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: backend/Dockerfile
          load: true
          push: false
          tags: pantrypilot-api:ci
      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: "1"
          format: table
          ignore-unfixed: true
          image-ref: pantrypilot-api:ci
          scanners: vuln
          severity: CRITICAL,HIGH
      - name: Smoke-test image
        shell: bash
        run: |
          container_id=$(docker run --detach --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=1g \
            --publish 127.0.0.1:8000:8000 pantrypilot-api:ci)
          trap 'docker logs "$container_id"; docker rm --force "$container_id" >/dev/null' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  deployment:
    name: Cloud Run configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate deploy-time configuration
        shell: bash
        run: |
          required=(
            OPENAI_MODEL
            OPENAI_TIMEOUT_SECONDS
            MAX_UPLOAD_MB
            MAX_IMAGE_UPLOAD_MB
            MAX_IMAGES
            MAX_VIDEO_SECONDS
            MAX_FRAMES
            SERPAPI_SEARCH_URL
            SERPAPI_COUNTRY
            SERPAPI_LANGUAGE
            GOOGLE_PLACES_SEARCH_URL
            RECIPE_IMAGE_MODEL
            RECIPE_IMAGE_SIZE
            RECIPE_IMAGE_TIMEOUT_SECONDS
            CORS_ALLOWED_ORIGINS
            ALLOWED_HOSTS
            APP_CHECK_ENFORCED
            APP_CHECK_PROJECT_ID
            APP_CHECK_ALLOWED_APP_IDS
          )
          for name in "${required[@]}"; do
            grep --quiet --regexp="^${name}=" cloudrun/config.env
          done
          test "$(grep --count '^MAX_UPLOAD_MB=28$' cloudrun/config.env)" -eq 1
          test "$(grep --count '^MAX_IMAGE_UPLOAD_MB=7$' cloudrun/config.env)" -eq 1
