name: Build Mobile Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-production-build
  cancel-in-progress: false

jobs:
  build:
    name: Queue Android and iOS production builds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Materialize Firebase build configuration
        env:
          FIREBASE_ANDROID_CONFIG: ${{ secrets.FIREBASE_ANDROID_CONFIG }}
          FIREBASE_IOS_CONFIG: ${{ secrets.FIREBASE_IOS_CONFIG }}
        run: |
          test -n "$FIREBASE_ANDROID_CONFIG"
          test -n "$FIREBASE_IOS_CONFIG"
          printf '%s' "$FIREBASE_ANDROID_CONFIG" | base64 --decode > google-services.json
          printf '%s' "$FIREBASE_IOS_CONFIG" | base64 --decode > GoogleService-Info.plist
      - name: Queue EAS production builds
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build --platform all --profile production --non-interactive --no-wait
