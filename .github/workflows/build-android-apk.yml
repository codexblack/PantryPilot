name: Publish Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_PUBLIC_API_URL: https://pantrypilot-api-vmyzdhul3a-uc.a.run.app
      EXPO_PUBLIC_APP_CHECK_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Set up Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Prepare Firebase configuration
        env:
          FIREBASE_ANDROID_CONFIG: ${{ secrets.FIREBASE_ANDROID_CONFIG }}
        run: |
          test -n "$FIREBASE_ANDROID_CONFIG"
          config_path="$RUNNER_TEMP/google-services.json"
          printf '%s' "$FIREBASE_ANDROID_CONFIG" | base64 --decode > "$config_path"
          echo "GOOGLE_SERVICES_JSON=$config_path" >> "$GITHUB_ENV"
      - name: Generate the Android project
        run: npx expo prebuild --platform android --no-install --clean
      - name: Assemble APK
        run: ./android/gradlew :app:assembleRelease
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_path="android/app/build/outputs/apk/release/app-release.apk"
          test -f "$asset_path"
          tag="android-apk-latest"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$tag" "$asset_path#PantryPilot.apk" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "$asset_path#PantryPilot.apk" \
              --prerelease \
              --title "PantryPilot Android APK" \
              --notes "Installable Android APK for direct testing. Google Play releases use the separate production app bundle." \
              --repo "$GITHUB_REPOSITORY"
          fi
