name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-preview-build
  cancel-in-progress: false

jobs:
  build:
    name: Build internal Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Synchronize Firebase configuration with EAS
        env:
          FIREBASE_ANDROID_CONFIG: ${{ secrets.FIREBASE_ANDROID_CONFIG }}
        run: |
          test -n "$FIREBASE_ANDROID_CONFIG"
          printf '%s' "$FIREBASE_ANDROID_CONFIG" | base64 --decode > google-services.json
          if ! npx eas-cli@latest env:create \
            --name GOOGLE_SERVICES_JSON \
            --value google-services.json \
            --type file \
            --environment preview \
            --visibility secret \
            --non-interactive; then
            npx eas-cli@latest env:update preview \
              --variable-name GOOGLE_SERVICES_JSON \
              --variable-environment preview \
              --name GOOGLE_SERVICES_JSON \
              --value google-services.json \
              --type file \
              --environment preview \
              --visibility secret \
              --non-interactive
          fi
      - name: Queue EAS preview build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build --platform android --profile preview --non-interactive --no-wait
